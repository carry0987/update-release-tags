name: Update Release Tag
description: >
  Automatically create or update sliding version tags (e.g. v1, v1.3) when a
  new semver tag is pushed.
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  tag:
    description: 'The source semver tag to slide from (e.g. v1.3.0). Falls back to GITHUB_REF_NAME if omitted.'
    required: false
    default: ''
  levels:
    description: 'Comma-separated tag levels to update: major, minor'
    required: false
    default: 'major'
  prefix:
    description: 'Tag prefix (e.g. v)'
    required: false
    default: 'v'
  skip-prerelease:
    description: 'Skip tag update if the source tag is a prerelease'
    required: false
    default: 'true'
  dry-run:
    description: 'Log what would be done without actually modifying tags'
    required: false
    default: 'false'

outputs:
  tags-updated:
    description: 'Comma-separated list of tags that were created/updated'
  commit-sha:
    description: 'The commit SHA that the source tag points to'
  skipped:
    description: 'Whether the update was skipped (true/false)'
  version:
    description: 'The full semver version without prefix (e.g. 1.3.0)'
  major:
    description: 'The major version number (e.g. 1)'
  minor:
    description: 'The minor version number (e.g. 3)'
  patch:
    description: 'The patch version number (e.g. 0)'
  is-prerelease:
    description: 'Whether the tag is a prerelease version (true/false)'

runs:
  using: node24
  main: dist/index.cjs
